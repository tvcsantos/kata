<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>kata</title>
    <!-- No remote code, no remote requests. ws://localhost is dev-only HMR;
         connect-src has no effect on packaged file:// builds beyond 'self'. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws://localhost:* http://localhost:*; font-src 'self'; object-src 'none'; base-uri 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
