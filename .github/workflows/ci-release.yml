name: Release (CI)

# Publishes every public @katahq/* workspace to npm when a version tag is
# pushed. Tag must match the package version, e.g. `git tag v0.1.0 && git push
# --tags`. The private docs workspace is skipped automatically.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./packages/cli/package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package version $PKG"
            exit 1
          fi

      - name: Build
        run: npm run build
      
      - name: Type check
        run: npm run typecheck
      
      - name: Test
        run: npm test

      - name: Publish to npm
        run: npm publish --workspaces --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
